<!DOCTYPE html>
<html>
<body>

<h2>Nhân viên</h2>

<input id="ma" placeholder="Mã NV">
<input id="ten" placeholder="Tên">
<button onclick="add()">Thêm</button>

<table border="1">
<tbody id="data"></tbody>
</table>

<script>
const api = "https://<link-codespace>/nhanvien";

function load(){
 fetch(api)
 .then(r=>r.json())
 .then(d=>{
  let html="";
  d.forEach(x=>{
    html+=`<tr>
      <td>${x.maNV}</td>
      <td>${x.hoTen}</td>
      <td><button onclick="del('${x.maNV}')">Xóa</button></td>
    </tr>`;
  });
  document.getElementById("data").innerHTML=html;
 });
}

function add(){
 fetch(api,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    maNV:ma.value,
    hoTen:ten.value
  })
 }).then(load);
}

function del(id){
 fetch(api+"/"+id,{method:"DELETE"}).then(load);
}

load();
</script>

</body>
</html>
